name: PR CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      contracts: ${{ steps.filter.outputs.contracts }}
      has_tests: ${{ steps.compute-test-matrix.outputs.has_tests }}
      need_token: ${{ steps.compute-test-matrix.outputs.need_token }}
      need_viewer: ${{ steps.compute-test-matrix.outputs.need_viewer }}
      need_registry: ${{ steps.compute-test-matrix.outputs.need_registry }}
      need_games: ${{ steps.compute-test-matrix.outputs.need_games }}
      indexer: ${{ steps.filter.outputs.indexer }}
      contracts_review: ${{ steps.filter.outputs.contracts_review }}
      indexer_review: ${{ steps.filter.outputs.indexer_review }}
      client_review: ${{ steps.filter.outputs.client_review }}
      general_review: ${{ steps.filter.outputs.general_review }}
      infra_ci: ${{ steps.filter.outputs.infra_ci }}
      general_ci: ${{ steps.filter.outputs.general_ci }}
      review_matrix: ${{ steps.compute-review-matrix.outputs.review_matrix }}
      has_reviews: ${{ steps.compute-review-matrix.outputs.has_reviews }}
      can_run_ai_reviews: ${{ steps.ai-gate.outputs.can_run_ai_reviews }}
      ai_reviews_block_reason: ${{ steps.ai-gate.outputs.ai_reviews_block_reason }}
      can_run_claude_reviews: ${{ steps.ai-gate.outputs.can_run_claude_reviews }}
      claude_reviews_block_reason: ${{ steps.ai-gate.outputs.claude_reviews_block_reason }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            contracts:
              - "contracts/packages/**"
              - "contracts/.tool-versions"
            contracts_review:
              - "contracts/**"
            indexer:
              - "indexer/**"
              - "api/**"
            indexer_review:
              - "indexer/**"
              - "api/**"
            client_review:
              - "client/**"
            general_review:
              - "**"
              - "!contracts/**"
              - "!indexer/**"
              - "!api/**"
              - "!client/**"
            review_automation_changed:
              - ".github/workflows/pr-ci.yml"
              - ".github/prompts/**"
            infra_ci:
              - ".github/workflows/**"
              - ".github/prompts/**"
            general_ci:
              - "codecov.yml"
              - "contracts/.tool-versions"
            interfaces:
              - "contracts/packages/interfaces/**"
            testing:
              - "contracts/packages/testing/**"
            token:
              - "contracts/packages/token/**"
            viewer:
              - "contracts/packages/viewer/**"
            registry:
              - "contracts/packages/registry/**"
            games:
              - "contracts/packages/games/**"
            tool_versions:
              - "contracts/.tool-versions"

      - name: Compute test matrix from changed packages
        id: compute-test-matrix
        env:
          FILTER_INTERFACES: ${{ steps.filter.outputs.interfaces }}
          FILTER_TESTING: ${{ steps.filter.outputs.testing }}
          FILTER_TOKEN: ${{ steps.filter.outputs.token }}
          FILTER_VIEWER: ${{ steps.filter.outputs.viewer }}
          FILTER_REGISTRY: ${{ steps.filter.outputs.registry }}
          FILTER_GAMES: ${{ steps.filter.outputs.games }}
          FILTER_TOOL_VERSIONS: ${{ steps.filter.outputs.tool_versions }}
        run: |
          # Determine which packages need testing based on transitive deps
          # interfaces, testing, or .tool-versions → ALL packages
          # individual package → just that package

          RUN_ALL="false"
          NEED_TOKEN="false"
          NEED_VIEWER="false"
          NEED_REGISTRY="false"
          NEED_GAMES="false"

          if [ "$FILTER_INTERFACES" = "true" ] || [ "$FILTER_TESTING" = "true" ] || [ "$FILTER_TOOL_VERSIONS" = "true" ]; then
            RUN_ALL="true"
          fi

          if [ "$RUN_ALL" != "true" ]; then
            [ "$FILTER_TOKEN" = "true" ] && NEED_TOKEN="true"
            [ "$FILTER_VIEWER" = "true" ] && NEED_VIEWER="true"
            [ "$FILTER_REGISTRY" = "true" ] && NEED_REGISTRY="true"
            [ "$FILTER_GAMES" = "true" ] && NEED_GAMES="true"
          fi

          if [ "$RUN_ALL" = "true" ]; then
            NEED_TOKEN="true"
            NEED_VIEWER="true"
            NEED_REGISTRY="true"
            NEED_GAMES="true"
          fi

          HAS_TESTS="false"
          for flag in "$NEED_TOKEN" "$NEED_VIEWER" "$NEED_REGISTRY" "$NEED_GAMES"; do
            if [ "$flag" = "true" ]; then
              HAS_TESTS="true"
              break
            fi
          done

          echo "has_tests=$HAS_TESTS" >> "$GITHUB_OUTPUT"
          echo "need_token=$NEED_TOKEN" >> "$GITHUB_OUTPUT"
          echo "need_viewer=$NEED_VIEWER" >> "$GITHUB_OUTPUT"
          echo "need_registry=$NEED_REGISTRY" >> "$GITHUB_OUTPUT"
          echo "need_games=$NEED_GAMES" >> "$GITHUB_OUTPUT"
          echo "Packages to test: token=$NEED_TOKEN viewer=$NEED_VIEWER registry=$NEED_REGISTRY games=$NEED_GAMES"

      - name: Compute review matrix
        id: compute-review-matrix
        env:
          CONTRACTS_REVIEW: ${{ steps.filter.outputs.contracts_review }}
          INDEXER_REVIEW: ${{ steps.filter.outputs.indexer_review }}
          CLIENT_REVIEW: ${{ steps.filter.outputs.client_review }}
          GENERAL_REVIEW: ${{ steps.filter.outputs.general_review }}
        run: |
          ENTRIES='[]'
          add() {
            ENTRIES=$(echo "$ENTRIES" | jq -c \
              --arg s "$1" --arg p "$2" --arg h "$3" --arg d "$4" \
              '. + [{scope:$s,prompt_file:$p,comment_header:$h,diff_paths:$d}]')
          }

          if [ "$CONTRACTS_REVIEW" = "true" ]; then
            add contracts .github/prompts/cairo-review.md "Cairo/Starknet Contract Review" "contracts/"
          fi
          if [ "$INDEXER_REVIEW" = "true" ]; then
            add indexer .github/prompts/indexer-review.md "Indexer/API Review" "indexer/ api/"
          fi
          if [ "$CLIENT_REVIEW" = "true" ]; then
            add client .github/prompts/client-review.md "Client Review" "client/"
          fi
          if [ "$GENERAL_REVIEW" = "true" ]; then
            add general .github/prompts/general-purpose.md "General Engineering Review" ". ':(exclude)contracts/**' ':(exclude)indexer/**' ':(exclude)api/**' ':(exclude)client/**'"
          fi

          MATRIX=$(echo "$ENTRIES" | jq -c '{include:.}')
          echo "review_matrix=$MATRIX" >> "$GITHUB_OUTPUT"

          if [ "$ENTRIES" = '[]' ]; then
            echo "has_reviews=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_reviews=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine AI review availability
        id: ai-gate
        env:
          IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REVIEW_AUTOMATION_CHANGED: ${{ steps.filter.outputs.review_automation_changed }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CODEX_AUTH_DOT_JSON: ${{ secrets.CODEX_AUTH_DOT_JSON }}
        run: |
          CAN_RUN_AI_REVIEWS="true"
          AI_REVIEWS_BLOCK_REASON="available"
          CAN_RUN_CLAUDE_REVIEWS="true"
          CLAUDE_REVIEWS_BLOCK_REASON="available"
          IS_TRUSTED_BOT_PR="false"

          if printf '%s' "$PR_AUTHOR" | tr '[:upper:]' '[:lower:]' | grep -Eq '^(dependabot\[bot\]|dependabot-preview\[bot\]|renovate\[bot\])$'; then
            IS_TRUSTED_BOT_PR="true"
          fi

          if [ "$IS_FORK" = "true" ]; then
            CAN_RUN_AI_REVIEWS="false"
            AI_REVIEWS_BLOCK_REASON="fork"
            echo "AI reviews disabled for fork pull requests."
          elif [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ] || [ -z "$CODEX_AUTH_DOT_JSON" ]; then
            CAN_RUN_AI_REVIEWS="false"
            if [ "$IS_TRUSTED_BOT_PR" = "true" ]; then
              AI_REVIEWS_BLOCK_REASON="missing_secrets_trusted_bot"
              echo "AI reviews disabled because required secrets are unavailable for a trusted bot PR."
            else
              AI_REVIEWS_BLOCK_REASON="missing_secrets"
              echo "AI reviews disabled because required secrets are unavailable."
            fi
          fi

          if [ "$CAN_RUN_AI_REVIEWS" != "true" ]; then
            CAN_RUN_CLAUDE_REVIEWS="false"
            CLAUDE_REVIEWS_BLOCK_REASON="$AI_REVIEWS_BLOCK_REASON"
          elif [ "$REVIEW_AUTOMATION_CHANGED" = "true" ]; then
            CAN_RUN_AI_REVIEWS="false"
            AI_REVIEWS_BLOCK_REASON="review_automation_modified"
            CAN_RUN_CLAUDE_REVIEWS="false"
            CLAUDE_REVIEWS_BLOCK_REASON="review_automation_modified"
            echo "AI reviews disabled because .github/workflows/pr-ci.yml or .github/prompts/** are modified in this PR."
          fi

          echo "can_run_ai_reviews=$CAN_RUN_AI_REVIEWS" >> "$GITHUB_OUTPUT"
          echo "ai_reviews_block_reason=$AI_REVIEWS_BLOCK_REASON" >> "$GITHUB_OUTPUT"
          echo "can_run_claude_reviews=$CAN_RUN_CLAUDE_REVIEWS" >> "$GITHUB_OUTPUT"
          echo "claude_reviews_block_reason=$CLAUDE_REVIEWS_BLOCK_REASON" >> "$GITHUB_OUTPUT"

  infra-validate:
    needs: changes
    if: needs.changes.outputs.infra_ci == 'true' || needs.changes.outputs.general_ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Validate workflow YAML
        run: |
          YAML_CLI="yaml@2.8.1"
          for file in .github/workflows/*.yml .github/workflows/*.yaml; do
            [ -f "$file" ] || continue
            npx -y "$YAML_CLI" valid < "$file"
          done

          if [ -f codecov.yml ]; then
            npx -y "$YAML_CLI" valid < codecov.yml
          fi

      - name: Validate package count matches codecov config
        run: |
          matrix_count=$(grep -cE '^\s+module:' .github/workflows/main-ci.yml)
          codecov_count=$(grep 'after_n_builds:' codecov.yml | grep -oE '[0-9]+')

          echo "Matrix modules: $matrix_count"
          echo "Codecov after_n_builds: $codecov_count"

          if [ "$matrix_count" != "$codecov_count" ]; then
            echo "::error::Matrix has $matrix_count modules but codecov.yml expects $codecov_count builds"
            echo "::error::Update codecov.yml after_n_builds to match module count"
            exit 1
          fi

          echo "Configuration validated: $matrix_count modules"

  lint:
    needs: changes
    if: needs.changes.outputs.contracts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup Scarb
        uses: software-mansion/setup-scarb@v1
        with:
          tool-versions: contracts/.tool-versions
          cache: false

      - name: Scarb fmt
        run: cd contracts && scarb fmt --check --workspace

  setup:
    needs: [changes, lint]
    if: needs.changes.outputs.has_tests == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      test_matrix: ${{ steps.build-matrix.outputs.test_matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Build test matrix from package flags
        id: build-matrix
        env:
          NEED_TOKEN: ${{ needs.changes.outputs.need_token }}
          NEED_VIEWER: ${{ needs.changes.outputs.need_viewer }}
          NEED_REGISTRY: ${{ needs.changes.outputs.need_registry }}
          NEED_GAMES: ${{ needs.changes.outputs.need_games }}
        run: |
          # Build JSON matrix from per-package boolean flags
          # Module catalog must match main-ci.yml
          INCLUDES="[]"
          add() { INCLUDES=$(echo "$INCLUDES" | jq -c --arg p "$1" --arg m "$2" --argjson f "$3" '. + [{package:$p,module:$m,fuzzer_runs:$f}]'); }

          if [ "$NEED_TOKEN" = "true" ]; then
            add denshokan_token token 256
          fi
          if [ "$NEED_VIEWER" = "true" ]; then
            add denshokan_viewer viewer 256
          fi
          if [ "$NEED_REGISTRY" = "true" ]; then
            add denshokan_registry registry 256
          fi
          if [ "$NEED_GAMES" = "true" ]; then
            add denshokan_games games 256
          fi

          MATRIX=$(echo "$INCLUDES" | jq -c '{include:.}')
          echo "test_matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Matrix: $(echo "$INCLUDES" | jq 'length') modules"
          echo "$MATRIX" | jq .

      - name: Extract tool versions
        run: |
          echo "SCARB_VERSION=$(grep '^scarb ' contracts/.tool-versions | awk '{print $2}')" >> "$GITHUB_ENV"
          echo "FOUNDRY_VERSION=$(grep '^starknet-foundry ' contracts/.tool-versions | awk '{print $2}')" >> "$GITHUB_ENV"

      - uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: ${{ env.SCARB_VERSION }}
          cache: false

      - uses: foundry-rs/setup-snfoundry@v4
        with:
          starknet-foundry-version: ${{ env.FOUNDRY_VERSION }}

      - name: Cache Scarb dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/scarb
          key: ${{ runner.os }}-scarb-deps-${{ hashFiles('contracts/**/Scarb.toml', 'contracts/**/Scarb.lock') }}
          restore-keys: |
            ${{ runner.os }}-scarb-deps-

      - name: Cache Cargo (snforge plugin + Scarb Rust deps)
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-snforge-${{ env.FOUNDRY_VERSION }}
          restore-keys: |
            ${{ runner.os }}-cargo-snforge-

      - name: Fetch dependencies
        run: cd contracts && scarb fetch

      - name: Warm snforge plugin cache
        run: snforge --version

  test:
    name: test (${{ matrix.module }})
    needs: [changes, setup]
    if: needs.changes.outputs.has_tests == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs.setup.outputs.test_matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract tool versions
        run: |
          echo "SCARB_VERSION=$(grep '^scarb ' contracts/.tool-versions | awk '{print $2}')" >> "$GITHUB_ENV"
          echo "FOUNDRY_VERSION=$(grep '^starknet-foundry ' contracts/.tool-versions | awk '{print $2}')" >> "$GITHUB_ENV"

      - uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: ${{ env.SCARB_VERSION }}
          cache: false

      - uses: foundry-rs/setup-snfoundry@v4
        with:
          starknet-foundry-version: ${{ env.FOUNDRY_VERSION }}

      - name: Cache Scarb dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/scarb
          key: ${{ runner.os }}-scarb-deps-${{ hashFiles('contracts/**/Scarb.toml', 'contracts/**/Scarb.lock') }}
          restore-keys: |
            ${{ runner.os }}-scarb-deps-

      - name: Cache Cargo (snforge plugin)
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-snforge-${{ env.FOUNDRY_VERSION }}
          restore-keys: |
            ${{ runner.os }}-cargo-snforge-

      - name: Cache tools
        uses: actions/cache@v4
        id: cache-tools
        with:
          path: |
            ~/.local/bin/cairo-coverage
            ~/.local/bin/universal-sierra-compiler
          key: ${{ runner.os }}-tools-cairo-coverage-universal-sierra-compiler-v1

      - name: Install tools
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          (curl -L https://raw.githubusercontent.com/software-mansion/cairo-coverage/main/scripts/install.sh | sh) &
          (curl -L https://raw.githubusercontent.com/software-mansion/universal-sierra-compiler/master/scripts/install.sh | sh) &
          wait

      - name: Cache compiled packages
        uses: actions/cache@v4
        with:
          path: contracts/target/
          key: ${{ runner.os }}-target-${{ matrix.package }}-${{ matrix.module }}-${{ env.SCARB_VERSION }}-${{ hashFiles('contracts/packages/**/*.cairo', 'contracts/**/Scarb.toml', 'contracts/**/Scarb.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-${{ matrix.package }}-${{ matrix.module }}-${{ env.SCARB_VERSION }}-

      - name: Run tests with coverage
        run: cd contracts && snforge test -p ${{ matrix.package }} --fuzzer-runs ${{ matrix.fuzzer_runs }} --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./contracts/coverage/coverage.lcov
          flags: ${{ matrix.module }}
          token: ${{ secrets.CODECOV_TOKEN }}

  typecheck-indexer:
    needs: changes
    if: needs.changes.outputs.indexer == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: TypeScript check (indexer)
        run: cd indexer && npx tsc --noEmit

      - name: TypeScript check (api)
        run: cd api && npx tsc --noEmit

  claude-review:
    needs: changes
    if: needs.changes.outputs.has_reviews == 'true' && needs.changes.outputs.can_run_claude_reviews == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.review_matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build review prompt
        id: build-prompt
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REVIEW_MARKER: run=${{ github.run_id }} attempt=${{ github.run_attempt }} sha=${{ github.event.pull_request.head.sha }} scope=${{ matrix.scope }}
        run: |
          {
            cat "${{ matrix.prompt_file }}"

            echo ""
            echo "---"
            echo ""
            echo "This is PR #${{ github.event.pull_request.number }} for ${{ github.repository }}."
            echo ""
            echo "Review ONLY the changes introduced by the PR. Run this command to see the diff:"
            echo "  git diff ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} -- ${{ matrix.diff_paths }}"
            echo ""
            echo "Pull request title: ${PR_TITLE}"
            echo "Pull request body:"
            echo "${PR_BODY}"
            echo ""
            echo "---"
            echo ""
            echo "Start your response with this exact heading:"
            echo "## Claude Review - ${{ matrix.comment_header }}"
            echo "Include this exact marker on its own line near the top of your response:"
            echo "$REVIEW_MARKER"
            echo ""

            cat <<'PROMPT_EOF'
          Format each finding as:
          [SEVERITY] file_path:line_number - description
          Impact: what could go wrong
          Fix: concrete code change

          Where SEVERITY is one of: CRITICAL, HIGH, MEDIUM, LOW, INFO

          End with a summary: counts of findings by severity.

          IMPORTANT: Always produce output, even when no issues are found.
          If there are no actionable findings, respond with:
            "No issues found." followed by "Summary: 0 CRITICAL, 0 HIGH, 0 MEDIUM, 0 LOW, 0 INFO"
          PROMPT_EOF
          } > /tmp/prompt.txt

          DELIMITER=$(openssl rand -hex 16)
          echo "prompt<<${DELIMITER}" >> "$GITHUB_OUTPUT"
          cat /tmp/prompt.txt >> "$GITHUB_OUTPUT"
          echo "${DELIMITER}" >> "$GITHUB_OUTPUT"

      - name: Run Claude review
        id: claude-review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: ${{ steps.build-prompt.outputs.prompt }}
          allowed_tools: "Bash(git diff *),Bash(git log *),Bash(git show *),Read,Glob,Grep"

      - name: Check for blocking findings
        if: always() && steps.claude-review.outcome != 'cancelled' && steps.claude-review.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ github.token }}
          HEADER: "## Claude Review - ${{ matrix.comment_header }}"
          REVIEW_MARKER: run=${{ github.run_id }} attempt=${{ github.run_attempt }} sha=${{ github.event.pull_request.head.sha }} scope=${{ matrix.scope }}
          REVIEW_OUTCOME: ${{ steps.claude-review.outcome }}
        run: |
          if [ "$REVIEW_OUTCOME" = "failure" ]; then
            echo "::error::Claude review step failed — no comment expected"
            exit 1
          fi

          MAX_ATTEMPTS=6
          SLEEP_SECONDS=10
          BODY=""

          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            BODY=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" --paginate \
              | jq -r --arg header "$HEADER" --arg marker "$REVIEW_MARKER" \
                '[.[] | select((.body // "") | contains($header) and contains($marker))] | last | .body // ""')

            if [ -z "$BODY" ]; then
              BODY=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" --paginate \
                | jq -r --arg header "$HEADER" --arg run_token "run=${{ github.run_id }}" --arg sha_token "sha=${{ github.event.pull_request.head.sha }}" \
                  '[.[] | select((.body // "") | contains($header) and contains($run_token) and contains($sha_token))] | last | .body // ""')
            fi

            if [ -n "$BODY" ]; then
              echo "Found Claude review comment on attempt $i"
              break
            fi

            if [ "$i" -lt "$MAX_ATTEMPTS" ]; then
              echo "Claude review comment not found yet; sleeping ${SLEEP_SECONDS}s... (attempt $i/$MAX_ATTEMPTS)"
              sleep "$SLEEP_SECONDS"
            fi
          done

          if [ -z "$BODY" ]; then
            echo "::error::Could not find Claude review output for ${{ matrix.scope }}"
            exit 1
          fi

          if echo "$BODY" | grep -qE '\[(CRITICAL|HIGH)\]'; then
            echo "::error::Review found CRITICAL or HIGH severity issues"
            exit 1
          fi

          echo "No blocking findings detected"

  codex-review:
    needs: changes
    if: needs.changes.outputs.has_reviews == 'true' && needs.changes.outputs.can_run_ai_reviews == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.review_matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Inject OAuth session
        run: |
          mkdir -p ~/.codex
          echo '${{ secrets.CODEX_AUTH_DOT_JSON }}' > ~/.codex/auth.json
          chmod 600 ~/.codex/auth.json

      - name: Build review prompt
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          {
            cat "${{ matrix.prompt_file }}"

            echo ""
            echo "---"
            echo ""
            echo "This is PR #${{ github.event.pull_request.number }} for ${{ github.repository }}."
            echo ""
            echo "Review ONLY the changes introduced by the PR. Run this command to see the diff:"
            echo "  git diff ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} -- ${{ matrix.diff_paths }}"
            echo ""
            echo "Pull request title: ${PR_TITLE}"
            echo "Pull request body:"
            echo "${PR_BODY}"
            echo ""
            echo "---"
            echo ""

            cat <<'PROMPT_EOF'
          Format each finding as:
          [SEVERITY] file_path:line_number - description
          Impact: what could go wrong
          Fix: concrete code change

          Where SEVERITY is one of: CRITICAL, HIGH, MEDIUM, LOW, INFO

          End with a summary: counts of findings by severity.

          IMPORTANT: Always produce output, even when no issues are found.
          If there are no actionable findings, respond with:
            "No issues found." followed by "Summary: 0 CRITICAL, 0 HIGH, 0 MEDIUM, 0 LOW, 0 INFO"
          PROMPT_EOF
          } > /tmp/prompt.txt

      - name: Run Codex review
        run: |
          npx -y @openai/codex@0.98.0 exec --full-auto \
            -c 'model="gpt-5.3-codex"' \
            -c 'model_reasoning_effort="high"' \
            -o /tmp/review.txt \
            "$(cat /tmp/prompt.txt)" 2>&1 || {
              echo "Review process failed to complete." > /tmp/review.txt
              exit 1
            }

          if [ -f /tmp/review.txt ]; then
            cat /tmp/review.txt
          else
            echo "Codex did not produce /tmp/review.txt"
          fi

      - name: Post review comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "## Codex Review - ${{ matrix.comment_header }}"
            echo ""
            if [ -s /tmp/review.txt ]; then
              cat /tmp/review.txt
            else
              echo "No review output was produced."
            fi
          } > /tmp/review-formatted.txt

          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/review-formatted.txt

      - name: Check for blocking findings
        if: always()
        run: |
          if [ ! -s /tmp/review.txt ]; then
            echo "::error::No review output was produced despite reviewable changes"
            exit 1
          fi

          if grep -qE '\[(CRITICAL|HIGH)\]' /tmp/review.txt; then
            echo "::error::Review found CRITICAL or HIGH severity issues"
            exit 1
          fi

          echo "No blocking findings detected"

  pr-ci:
    needs:
      - changes
      - infra-validate
      - lint
      - setup
      - test
      - typecheck-indexer
      - claude-review
      - codex-review
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate results
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
          HAS_REVIEWS: ${{ needs.changes.outputs.has_reviews }}
          CAN_RUN_AI_REVIEWS: ${{ needs.changes.outputs.can_run_ai_reviews }}
          AI_REVIEWS_BLOCK_REASON: ${{ needs.changes.outputs.ai_reviews_block_reason }}
          CAN_RUN_CLAUDE_REVIEWS: ${{ needs.changes.outputs.can_run_claude_reviews }}
          CLAUDE_REVIEWS_BLOCK_REASON: ${{ needs.changes.outputs.claude_reviews_block_reason }}
        run: |
          FAILED=$(echo "$NEEDS_JSON" | jq -r '
            to_entries[]
            | select(.value.result == "failure" or .value.result == "cancelled")
            | .key
          ')

          if [ -n "$FAILED" ]; then
            echo "::error::Failing jobs:"
            echo "$FAILED"
            exit 1
          fi

          if [ "$CAN_RUN_AI_REVIEWS" != "true" ]; then
            if [ "$AI_REVIEWS_BLOCK_REASON" = "fork" ] || [ "$AI_REVIEWS_BLOCK_REASON" = "missing_secrets_trusted_bot" ] || [ "$AI_REVIEWS_BLOCK_REASON" = "review_automation_modified" ]; then
              echo "Skipping review enforcement because AI reviews are unavailable ($AI_REVIEWS_BLOCK_REASON)."
            elif [ "$AI_REVIEWS_BLOCK_REASON" = "missing_secrets" ]; then
              if [ "$HAS_REVIEWS" = "true" ]; then
                echo "::error::AI review secrets are unavailable for a first-party PR with reviewable changes."
                echo "::error::Restore CLAUDE_CODE_OAUTH_TOKEN and CODEX_AUTH_DOT_JSON or resolve secret access before merge."
                exit 1
              fi
              echo "AI review secrets are unavailable, but no reviewable changes were detected."
            else
              echo "::error::Unexpected AI review availability state: $AI_REVIEWS_BLOCK_REASON"
              exit 1
            fi
          else
            MISSING_REVIEWS=""

            if [ "$HAS_REVIEWS" = "true" ]; then
              if [ "$CAN_RUN_CLAUDE_REVIEWS" = "true" ]; then
                CLAUDE_RESULT=$(echo "$NEEDS_JSON" | jq -r '.["claude-review"].result // "unknown"')
                if [ "$CLAUDE_RESULT" = "skipped" ]; then
                  MISSING_REVIEWS="${MISSING_REVIEWS}claude-review"$'\n'
                fi
              fi

              CODEX_RESULT=$(echo "$NEEDS_JSON" | jq -r '.["codex-review"].result // "unknown"')
              if [ "$CODEX_RESULT" = "skipped" ]; then
                MISSING_REVIEWS="${MISSING_REVIEWS}codex-review"$'\n'
              fi
            fi

            if [ -n "$MISSING_REVIEWS" ]; then
              echo "::error::Required review jobs were skipped:"
              echo "$MISSING_REVIEWS"
              exit 1
            fi
          fi

          echo "All required jobs passed or were skipped"
