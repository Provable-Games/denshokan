codecov:
  require_ci_to_pass: true
  notify:
    # Must equal module count in .github/workflows/main-ci.yml matrix
    after_n_builds: 4

comment:
  layout: "diff, files, header, footer"
  behavior: default

coverage:
  precision: 2
  round: down
  range: 80..100
  status:
    project:
      default:
        target: auto
        threshold: 4%
    patch:
      default:
        target: 80%
        threshold: 4%
        informational: true

flag_management:
  default_rules:
    carryforward: true

ignore:
  - "**/tests/**"
  - "contracts/packages/testing/**"
  - "contracts/packages/interfaces/**"

github_checks:
  annotations: false
