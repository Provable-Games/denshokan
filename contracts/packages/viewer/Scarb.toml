[package]
name = "denshokan_viewer"
version = "0.1.0"
edition.workspace = true
cairo-version.workspace = true

[dependencies]
starknet.workspace = true
denshokan_interfaces.workspace = true
game_components_embeddable_game_standard.workspace = true
openzeppelin_access.workspace = true
openzeppelin_interfaces.workspace = true
openzeppelin_upgrades.workspace = true

[dev-dependencies]
snforge_std.workspace = true
denshokan_testing.workspace = true
denshokan_token.workspace = true
denshokan_registry.workspace = true


[[target.starknet-contract]]
sierra = true
casm = true
build-external-contracts = [
    "denshokan_token::denshokan::Denshokan",
    "denshokan_registry::minigame_registry::MinigameRegistry",
    "denshokan_testing::mocks::minigame_starknet_mock::minigame_starknet_mock",
]

[lib]
name = "denshokan_viewer"
